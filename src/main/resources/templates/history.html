<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Tsinjo - Historique</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    <link rel="stylesheet" th:href="@{/style/history.css}">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gray-100 font-[Poppins] text-gray-700">

<div th:replace="fragments/header :: header"></div>

<div class="container mx-auto px-4 py-6">

    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6 max-w-4xl mx-auto">
        <div class="bg-white rounded-lg shadow-sm p-4 hover:shadow transition flex flex-col justify-center items-center">
            <h3 class="text-[#16163f] font-semibold text-lg">Donations Confirmées</h3>
            <p class="text-xl font-extrabold text-[#9933cc] mt-1"
               th:text="${fund.allConfirmedDonations != null ? #numbers.formatInteger(fund.allConfirmedDonations, 0, 'COMMA') + ' Ar' : '--'}">0 Ar</p>
        </div>
        <div class="bg-white rounded-lg shadow-sm p-4 hover:shadow transition flex flex-col justify-center items-center">
            <h3 class="text-[#16163f] font-semibold text-lg">Aides Confirmées</h3>
            <p class="text-xl font-extrabold text-[#9933cc] mt-1"
               th:text="${fund.allConfirmedHelps != null ? #numbers.formatInteger(fund.allConfirmedHelps, 0, 'COMMA') + ' Ar' : '--'}">0 Ar</p>
        </div>
        <div class="bg-white rounded-lg shadow-sm p-4 hover:shadow transition flex flex-col justify-center items-center">
            <h3 class="text-[#16163f] font-semibold text-lg">Fonds Restants</h3>
            <p class="text-xl font-extrabold text-[#9933cc] mt-1"
               th:text="${fund.confirmedRemainingFund != null ? #numbers.formatInteger(fund.confirmedRemainingFund, 0, 'COMMA') + ' Ar' : '--'}">0 Ar</p>
        </div>
    </div>

    <h2 class="text-xl font-bold text-[#16163f] mb-3 text-center">Historique des donations</h2>

    <div class="bg-white rounded-lg shadow-sm overflow-hidden">
        <div class="table-container">
            <table class="w-full compact-table">
                <thead class="bg-gray-50">
                <tr>
                    <th class="py-2 px-3 text-left font-semibold text-gray-600 text-sm">Date/Heure</th>
                    <th class="py-2 px-3 text-left font-semibold text-gray-600 text-sm">Donateur</th>
                    <th class="py-2 px-3 text-right font-semibold text-gray-600 text-sm">Montant</th>
                    <th class="py-2 px-3 text-left font-semibold text-gray-600 text-sm">Référence</th>
                    <th class="py-2 px-3 text-center font-semibold text-gray-600 text-sm">Statut</th>
                </tr>
                </thead>
                <tbody class="divide-y divide-gray-100">
                <tr th:each="event : ${events}"
                    th:class="${event.event.payment.status.name() == 'REFUSED' ? 'transaction-row bg-red-50' : 'transaction-row'}"
                    class="hover:bg-gray-50">

                    <td class="py-2 px-3 whitespace-nowrap">
                            <span class="text-gray-500 text-sm"
                                  th:text="${event.event.creationInstant != null ? #temporals.format(event.event.creationInstant, 'dd/MM/yy HH:mm') : '--'}">
                                --
                            </span>
                    </td>

                    <td class="py-2 px-3">
                            <span class="text-sm" th:text="${event.event.user.firstName + ' ' + event.event.user.lastName}">
                                Nom du donateur
                            </span>
                    </td>

                    <td class="py-2 px-3 text-right font-semibold text-purple-700 whitespace-nowrap">
                            <span class="text-sm" th:text="${event.event.payment.amount != null ? #numbers.formatInteger(event.event.payment.amount, 0, 'COMMA') + ' Ar' : '--'}">
                                0 Ar
                            </span>
                    </td>

                    <td class="py-2 px-3 ref-cell">
                        <div class="flex items-center">
                            <div class="w-1.5 h-1.5 bg-orange-500 rounded-full mr-1.5 flex-shrink-0"></div>
                            <span class="text-orange-700 font-mono text-sm truncate"
                                  th:text="${event.event.payment.pspId()}">
                                    OM123456789
                                </span>
                        </div>
                    </td>

                    <td class="py-2 px-3 text-center">
                            <span th:if="${event.event.payment.status.name() == 'CONFIRMED'}"
                                  class="status-badge bg-green-100 text-green-800">
                                Succès
                            </span>
                        <span th:if="${event.event.payment.status.name() == 'VERIFYING'}"
                              class="status-badge bg-yellow-100 text-yellow-800">
                                En cours
                            </span>
                        <span th:if="${event.event.payment.status.name() == 'REFUSED'}"
                              class="status-badge bg-red-100 text-red-800">
                                Refusé
                            </span>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="flex justify-center mt-4 gap-2">
        <a th:if="${currentPage > 0}"
           th:href="@{/history(page=${currentPage - 1}, size=${size})}"
           class="px-3 py-1 bg-gray-200 rounded text-sm hover:bg-gray-300">Précédent</a>

        <span class="px-3 py-1 bg-gray-100 rounded text-sm">
            <span th:text="${currentPage + 1}"></span>/<span th:text="${totalPages}"></span>
        </span>

        <a th:if="${currentPage + 1 < totalPages}"
           th:href="@{/history(page=${currentPage + 1}, size=${size})}"
           class="px-3 py-1 bg-gray-200 rounded text-sm hover:bg-gray-300">Suivant</a>
    </div>

</div>

</body>
</html>
