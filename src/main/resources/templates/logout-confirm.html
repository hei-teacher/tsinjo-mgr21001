<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Tsinjo - Déconnexion</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Poppins', sans-serif;
        }
    </style>
</head>
<body class="min-h-screen bg-gray-100">
<div th:replace="fragments/header :: header"></div>

<main class="container mx-auto px-4 sm:px-6 py-8 sm:py-12 flex items-center justify-center min-h-[calc(100vh-100px)]">
    <div class="bg-white p-6 sm:p-8 md:p-10 rounded-xl shadow-lg max-w-md w-full">
        <!-- Icon -->
        <div class="text-center mb-6">
            <div class="inline-flex items-center justify-center w-16 h-16 sm:w-20 sm:h-20 bg-[#16163f] bg-opacity-10 rounded-full mb-4">
                <i class="material-icons text-[#16163f] text-4xl sm:text-5xl">logout</i>
            </div>
            <h1 class="text-2xl sm:text-3xl font-bold text-[#16163f] mb-3">
                Confirmer la déconnexion
            </h1>
            <p class="text-sm sm:text-base text-gray-600">
                Voulez-vous vraiment vous déconnecter de votre compte ?
            </p>
        </div>

        <!-- Form -->
        <form action="/perform-logout" method="post" class="space-y-4">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

            <!-- Logout Button -->
            <button type="submit"
                    class="w-full bg-[#16163f] hover:bg-opacity-90 text-white font-bold py-3 px-6 rounded-full transition-all transform hover:scale-105 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-[#16163f] text-sm sm:text-base flex items-center justify-center gap-2">
                <i class="material-icons text-lg">logout</i>
                <span>Oui, me déconnecter</span>
            </button>

            <!-- Cancel Button -->
            <a href="/"
               class="w-full bg-gray-200 hover:bg-gray-300 text-gray-800 font-bold py-3 px-6 rounded-full transition-all transform hover:scale-105 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-gray-400 text-sm sm:text-base flex items-center justify-center gap-2">
                <i class="material-icons text-lg">arrow_back</i>
                <span>Non, rester connecté</span>
            </a>
        </form>

        <!-- Info -->
        <div class="mt-6 p-3 rounded-lg bg-[#9933cc] bg-opacity-10 border border-[#9933cc] border-opacity-20">
            <div class="flex items-start gap-2">
                <i class="material-icons text-[#9933cc] text-sm mt-0.5">info</i>
                <p class="text-xs sm:text-sm text-gray-700">
                    Vous serez redirigé vers la page d'accueil après la déconnexion.
                </p>
            </div>
        </div>
    </div>
</main>

</body>
</html>
