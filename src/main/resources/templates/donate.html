<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Tsinjo - Donner</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="h-screen bg-gray-100" >
<div th:replace="fragments/header :: header"></div>

<!-- TODO: phone number as variable, or better: from a call to Vola -->
<h2 class="text-2xl font-bold text-[#3F2F6A] mb-6">Donner au 0328965189</h2>
<form th:action="@{/donate}" method="post">
    <label for="pspId">Référence de paiement Orange:</label>
    <input type="text" id="pspId" name="pspId"/>

    <br><br>

    <label for="firstName">Prénom:</label>
    <input type="text" id="firstName" name="firstName"/>

    <br><br>

    <label for="lastName">Nom:</label>
    <input type="text" id="lastName" name="lastName"/>

    <br><br>

    <button type="button"
            class="focus:outline-none text-white bg-green-700 hover:bg-green-800 focus:ring-4 focus:ring-green-300 font-medium rounded-lg text-sm px-5 py-2.5 me-2 mb-2 dark:bg-green-600 dark:hover:bg-green-700 dark:focus:ring-green-800">
        Donner
    </button>
</form>
</body>
</html>
