<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Tsinjo</title>
</head>

<body>

<h1>Tsinjo</h1>

<h2>Donner</h2>
<form th:action="@{/donate}" method="post">
    <label for="orangePaymentReference">Référence de paiement Orange:</label>
    <input type="text" id="orangePaymentReference" name="orangePaymentReference"/>

    <br><br>

    <label for="email">Email:</label>
    <input type="email" id="email" name="email"/>

    <br><br>

    <label for="firstName">Prénom:</label>
    <input type="text" id="firstName" name="firstName"/>

    <br><br>

    <label for="lastName">Nom:</label>
    <input type="text" id="lastName" name="lastName"/>

    <br><br>

    <button type="submit">Donner</button>
</form>

<h2>Historique</h2>
<ul>
    <li th:each="event : ${events}" th:text="${event.toString()}"></li>
</ul>
</body>
</html>
